name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          # Public vars (safe to expose at build time)
          NEXT_PUBLIC_SUPABASE_URL:      ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_APP_URL:           ${{ secrets.NEXT_PUBLIC_APP_URL }}
          # Server-side secrets (needed by Next.js server routes at build/runtime)
          SUPABASE_URL:                  ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY:     ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ENCRYPTION_KEY:                ${{ secrets.ENCRYPTION_KEY }}
          GITHUB_MODELS_TOKEN:           ${{ secrets.GITHUB_MODELS_TOKEN }}
          GITHUB_TOKEN:                  ${{ secrets.GH_TOKEN }}
          GROQ_API_KEY:                  ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY:               ${{ secrets.MISTRAL_API_KEY }}
          OPENROUTER_API_KEY:            ${{ secrets.OPENROUTER_API_KEY }}
          HUGGINGFACE_TOKEN:             ${{ secrets.HUGGINGFACE_TOKEN }}
          CLOUDFLARE_API_TOKEN:          ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID:         ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:  ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command:   pages deploy .next --project-name=agentforge --branch=main
